schemaVersion: 1.2

endpoints:
  - name: grafana
    displayName: Grafana Dashboard
    type: REST
    service:
      basePath: /
      port: 3000
    networkVisibilities:
      - Organization
      - Public

  - name: grpcreceiver
    displayName: OTLP gRPC Receiver
    type: GRPC
    service:
      basePath: /
      port: 4317
    networkVisibilities:
      - Project

  - name: httpreceiver
    displayName: OTLP HTTP Receiver
    type: REST
    service:
      basePath: /
      port: 4318
    networkVisibilities:
      - Organization
      - Public
