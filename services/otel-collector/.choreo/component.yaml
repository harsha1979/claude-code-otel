schemaVersion: 1.2

endpoints:
  - name: prometheusotel
    displayName: Prometheus Metrics Exporter
    type: REST
    service:
      basePath: /
      port: 8889
    networkVisibilities:
      - Project

  - name: otelgrpc
    displayName: OTLP gRPC Receiver
    type: GRPC
    service:
      basePath: /
      port: 4317
    networkVisibilities:
      - Public

  - name: otelhttp
    displayName: OTLP HTTP Receiver
    type: REST
    service:
      basePath: /
      port: 4318
    networkVisibilities:
      - Public
